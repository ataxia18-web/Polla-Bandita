<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Mundial 2026 · Al Momento — La Bandita de Macul</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pitch-0:#04140d;          /* night pitch */
    --pitch-1:#0a2417;
    --pitch-2:#0f3320;
    --line:#1d4d33;             /* faint pitch lines */
    --ink:#f2efe3;             /* warm off-white */
    --ink-dim:#9bb3a4;
    --gold:#e9b949;            /* trophy / camino al título */
    --gold-soft:rgba(233,185,73,.16);
    --live:#ff5a5f;            /* en vivo */
    --card:#0c2117;
    --card-2:#102a1c;
    --radius:14px;
    --shadow:0 10px 30px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Barlow Condensed",system-ui,sans-serif;
    background:
      radial-gradient(120% 80% at 85% -10%, rgba(34,140,79,.35), transparent 55%),
      radial-gradient(120% 90% at -10% 110%, rgba(20,90,52,.30), transparent 55%),
      linear-gradient(180deg,#06170e 0%,#04120b 100%);
    background-attachment:fixed;
    color:var(--ink);
    min-height:100dvh;
    -webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 24px);
  }
  .wrap{max-width:720px;margin:0 auto;padding:0 14px}

  /* ---------- Hero ---------- */
  header{padding:22px 0 10px;position:relative}
  .eyebrow{
    font-size:.82rem;letter-spacing:.42em;text-transform:uppercase;
    color:var(--gold);font-weight:600;margin:0 0 4px;padding-left:.42em;
  }
  h1{
    font-family:"Anton",sans-serif;font-weight:400;line-height:.92;
    margin:0;letter-spacing:.01em;text-transform:uppercase;
    font-size:clamp(2.6rem,12vw,4.4rem);
    background:linear-gradient(180deg,#ffffff 0%,#cfe6d6 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 2px 0 rgba(0,0,0,.25);
  }
  .sub{display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap}
  .badge{
    font-weight:600;letter-spacing:.06em;text-transform:uppercase;font-size:.82rem;
    color:#06170e;background:var(--gold);padding:3px 10px;border-radius:999px;
  }
  .sub .host{color:var(--ink-dim);font-size:1rem;letter-spacing:.04em}

  .progress{
    margin-top:16px;display:flex;align-items:center;gap:12px;
    background:linear-gradient(90deg,var(--card),transparent);
    border:1px solid var(--line);border-radius:var(--radius);
    padding:10px 14px;
  }
  .progress .bar{flex:1;height:8px;border-radius:99px;background:#10271b;overflow:hidden}
  .progress .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#f2d488);border-radius:99px;transition:width .5s}
  .progress .lbl{font-size:.92rem;color:var(--ink-dim);white-space:nowrap}
  .progress .lbl b{color:var(--ink);font-weight:700}

  /* ---------- Round selector ---------- */
  nav.rounds{
    position:sticky;top:0;z-index:20;margin:16px -14px 6px;
    padding:8px 14px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;
    background:linear-gradient(180deg,rgba(4,18,11,.96),rgba(4,18,11,.78));
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
  }
  nav.rounds::-webkit-scrollbar{display:none}
  .tab{
    flex:0 0 auto;border:1px solid var(--line);background:var(--card);
    color:var(--ink-dim);font-weight:600;letter-spacing:.05em;text-transform:uppercase;
    font-size:.92rem;padding:8px 14px;border-radius:999px;cursor:pointer;white-space:nowrap;
    transition:.18s;
  }
  .tab:hover{color:var(--ink)}
  .tab[aria-selected="true"]{background:var(--gold);color:#06170e;border-color:var(--gold)}
  .tab:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

  /* ---------- Match cards (round view) ---------- */
  .round-head{display:flex;align-items:baseline;justify-content:space-between;margin:18px 2px 8px}
  .round-head h2{font-family:"Anton";font-weight:400;letter-spacing:.04em;text-transform:uppercase;margin:0;font-size:1.5rem}
  .round-head .when{color:var(--ink-dim);font-size:.9rem;letter-spacing:.04em}

  .matches{display:grid;gap:10px}
  .match{
    background:linear-gradient(180deg,var(--card-2),var(--card));
    border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;
    box-shadow:var(--shadow);
  }
  .match .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:6px 12px;border-bottom:1px solid rgba(255,255,255,.04);
    font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-dim)
  }
  .pill{font-weight:700;padding:2px 8px;border-radius:999px;font-size:.72rem;letter-spacing:.08em}
  .pill.prog{background:#10271b;color:var(--ink-dim);border:1px solid var(--line)}
  .pill.live{background:rgba(255,90,95,.16);color:var(--live);border:1px solid rgba(255,90,95,.4)}
  .pill.live::before{content:"●";margin-right:5px;animation:blink 1.1s infinite}
  .pill.done{background:var(--gold-soft);color:var(--gold);border:1px solid rgba(233,185,73,.4)}
  @keyframes blink{50%{opacity:.25}}

  .team{
    display:flex;align-items:center;gap:12px;padding:11px 12px;cursor:default;
    border-left:3px solid transparent;
  }
  .team + .team{border-top:1px dashed rgba(255,255,255,.05)}
  .team .flag{font-size:1.5rem;line-height:1;width:1.7rem;text-align:center;filter:drop-shadow(0 1px 1px rgba(0,0,0,.4))}
  .team .name{flex:1;font-size:1.18rem;font-weight:600;letter-spacing:.01em}
  .team .name.tbd{color:var(--ink-dim);font-style:italic;font-weight:400}
  .team .score{font-family:"Anton";font-size:1.4rem;min-width:1.4ch;text-align:center;color:var(--ink-dim)}
  .team.win{border-left-color:var(--gold);background:linear-gradient(90deg,var(--gold-soft),transparent)}
  .team.win .name{color:var(--ink)}
  .team.win .score{color:var(--gold)}
  .team.lose{opacity:.5}

  /* admin controls */
  .adminrow{display:flex;gap:8px;padding:8px 12px;border-top:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.18)}
  .adminrow button{
    flex:1;border:1px solid var(--line);background:var(--card);color:var(--ink);
    font-family:inherit;font-weight:600;font-size:.92rem;letter-spacing:.04em;
    padding:8px;border-radius:9px;cursor:pointer;transition:.15s
  }
  .adminrow button:hover{border-color:var(--gold);color:var(--gold)}
  .adminrow button.clear{flex:0 0 auto;color:var(--ink-dim)}
  .adminrow .sc{display:flex;align-items:center;gap:4px;flex:0 0 auto}
  .adminrow input{width:42px;text-align:center;background:#06170e;border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:6px 2px;font-family:inherit;font-size:1rem}

  /* ---------- Bracket (cuadro) view ---------- */
  .cuadro-scroll{overflow-x:auto;padding:8px 2px 18px;-webkit-overflow-scrolling:touch}
  .cuadro{display:flex;gap:14px;min-width:max-content;align-items:stretch}
  .col{display:flex;flex-direction:column;justify-content:space-around;gap:10px;min-width:148px}
  .col.final-col{justify-content:center}
  .col h3{font-family:"Anton";font-weight:400;text-transform:uppercase;letter-spacing:.05em;font-size:.95rem;color:var(--ink-dim);text-align:center;margin:0 0 2px}
  .mini{
    background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden
  }
  .mini .t{display:flex;align-items:center;gap:7px;padding:7px 8px;font-size:.92rem}
  .mini .t + .t{border-top:1px solid rgba(255,255,255,.05)}
  .mini .t .f{font-size:1.05rem;width:1.2rem;text-align:center}
  .mini .t .n{flex:1;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px}
  .mini .t .n.tbd{color:var(--ink-dim);font-weight:400}
  .mini .t .s{font-family:"Anton";font-size:.95rem;color:var(--ink-dim)}
  .mini .t.win{background:var(--gold-soft)}
  .mini .t.win .n{color:var(--gold)}
  .mini .t.win .s{color:var(--gold)}
  .champ{
    text-align:center;border:1px solid var(--gold);border-radius:12px;padding:14px 10px;
    background:linear-gradient(180deg,var(--gold-soft),transparent)
  }
  .champ .cup{font-size:2rem}
  .champ .lbl{font-family:"Anton";text-transform:uppercase;letter-spacing:.1em;color:var(--gold);font-size:.8rem;margin-top:4px}
  .champ .who{font-size:1.25rem;font-weight:700;margin-top:2px}
  .champ .who.tbd{color:var(--ink-dim);font-weight:400;font-style:italic}
  .hint{color:var(--ink-dim);font-size:.85rem;text-align:center;margin:6px 0 0;letter-spacing:.03em}

  /* ---------- Footer / admin ---------- */
  footer{margin-top:26px;padding-top:14px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .foot-txt{color:var(--ink-dim);font-size:.82rem;letter-spacing:.04em}
  .adminbtn{background:none;border:1px solid var(--line);color:var(--ink-dim);font-family:inherit;font-weight:600;letter-spacing:.05em;text-transform:uppercase;font-size:.8rem;padding:7px 12px;border-radius:999px;cursor:pointer;transition:.15s}
  .adminbtn:hover{border-color:var(--gold);color:var(--gold)}
  .adminbtn.on{background:var(--gold);color:#06170e;border-color:var(--gold)}
  .saving{font-size:.78rem;color:var(--gold);opacity:0;transition:.3s}
  .saving.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="eyebrow">Al Momento</p>
    <h1>Mundial 2026</h1>
    <div class="sub">
      <span class="badge">Eliminación directa</span>
      <span class="host">La Bandita de Macul · 🇺🇸🇨🇦🇲🇽</span>
    </div>
    <div class="progress">
      <span class="lbl"><b id="pct">0</b>/15 partidos definidos</span>
      <div class="bar"><i id="barfill" style="width:0%"></i></div>
      <span class="lbl" id="phase">16avos</span>
    </div>
  </header>

  <nav class="rounds" id="tabs" role="tablist" aria-label="Rondas"></nav>

  <main id="view"></main>

  <footer>
    <span class="foot-txt">Se actualiza con los resultados reales <span class="saving" id="saving">guardado ✓</span></span>
    <button class="adminbtn" id="adminToggle">🔒 Modo admin</button>
  </footer>
</div>

<script>
/* ============================================================
   DATOS — 16avos del Mundial 2026 (cuadro real proyectado).
   Edita 'a' / 'b' (nombre + bandera) si la FIFA confirma un rival.
   El resto de las rondas se llenan SOLAS con los ganadores.
   ============================================================ */
const R32 = [
  {id:'r32-1',  a:{n:'Alemania',f:'🇩🇪'},      b:{n:'Paraguay',f:'🇵🇾'},     date:'30 jun'},
  {id:'r32-2',  a:{n:'Francia',f:'🇫🇷'},        b:{n:'Suecia',f:'🇸🇪'},       date:'1 jul'},
  {id:'r32-3',  a:{n:'Sudáfrica',f:'🇿🇦'},      b:{n:'Canadá',f:'🇨🇦'},       date:'28 jun'},
  {id:'r32-4',  a:{n:'Países Bajos',f:'🇳🇱'},   b:{n:'Marruecos',f:'🇲🇦'},    date:'29 jun'},
  {id:'r32-5',  a:{n:'Portugal',f:'🇵🇹'},       b:{n:'Ghana',f:'🇬🇭'},        date:'2 jul'},
  {id:'r32-6',  a:{n:'España',f:'🇪🇸'},         b:{n:'Austria',f:'🇦🇹'},      date:'2 jul'},
  {id:'r32-7',  a:{n:'Estados Unidos',f:'🇺🇸'}, b:{n:'Bosnia',f:'🇧🇦'},       date:'1 jul'},
  {id:'r32-8',  a:{n:'Por confirmar',f:'🏳️'},  b:{n:'Corea del Sur',f:'🇰🇷'},date:'3 jul'},
  {id:'r32-9',  a:{n:'Brasil',f:'🇧🇷'},         b:{n:'Japón',f:'🇯🇵'},        date:'29 jun'},
  {id:'r32-10', a:{n:'Costa de Marfil',f:'🇨🇮'},b:{n:'Noruega',f:'🇳🇴'},      date:'30 jun'},
  {id:'r32-11', a:{n:'México',f:'🇲🇽'},         b:{n:'Ecuador',f:'🇪🇨'},      date:'1 jul'},
  {id:'r32-12', a:{n:'Inglaterra',f:'🏴'},      b:{n:'Senegal',f:'🇸🇳'},      date:'2 jul'},
  {id:'r32-13', a:{n:'Argentina',f:'🇦🇷'},      b:{n:'Cabo Verde',f:'🇨🇻'},   date:'30 jun'},
  {id:'r32-14', a:{n:'Australia',f:'🇦🇺'},      b:{n:'Egipto',f:'🇪🇬'},       date:'1 jul'},
  {id:'r32-15', a:{n:'Suiza',f:'🇨🇭'},          b:{n:'Irán',f:'🇮🇷'},         date:'2 jul'},
  {id:'r32-16', a:{n:'Colombia',f:'🇨🇴'},       b:{n:'Croacia',f:'🇭🇷'},      date:'3 jul'},
];

const ADMIN_PIN = "1986"; // cámbialo antes de compartir con la Bandita

const ROUNDS = [
  {key:'r32', label:'16avos', title:'16avos de final', count:16, when:'28 jun – 3 jul'},
  {key:'r16', label:'8vos',   title:'Octavos de final', count:8,  when:'4 – 7 jul'},
  {key:'qf',  label:'4tos',   title:'Cuartos de final', count:4,  when:'9 – 12 jul'},
  {key:'sf',  label:'Semis',  title:'Semifinales',      count:2,  when:'14 – 15 jul'},
  {key:'f',   label:'Final',  title:'Final',            count:1,  when:'19 jul'},
  {key:'cuadro', label:'Cuadro', title:'Cuadro completo', count:0, when:''},
];

const TBD = {n:'Por definir', f:'⬜', tbd:true};
let results = {};      // { matchId: {win:'a'|'b', sa:Number|null, sb:Number|null} }
let isAdmin = false;
let current = 'r32';

/* ---------- persistencia compartida (todos ven lo mismo) ---------- */
async function loadResults(){
  try{ const r = await window.storage.get('mundial2026:results', true); if(r&&r.value) results = JSON.parse(r.value); }
  catch(e){ results = {}; }
}
async function saveResults(){
  try{
    await window.storage.set('mundial2026:results', JSON.stringify(results), true);
    const s=document.getElementById('saving'); s.classList.add('show'); setTimeout(()=>s.classList.remove('show'),1400);
  }catch(e){ console.error('No se pudo guardar', e); }
}

/* ---------- construir el árbol completo desde los resultados ---------- */
function winnerTeam(m){
  const r = results[m.id];
  if(!r||!r.win) return null;
  const t = m[r.win];
  return (t && !t.tbd) ? t : null;
}
function buildTree(){
  const tree = {r32:[], r16:[], qf:[], sf:[], f:[]};
  tree.r32 = R32.map(m=>({...m}));
  const advance = (src, prefix) => {
    const out=[];
    for(let i=0;i<src.length;i+=2){
      out.push({
        id: prefix+(i/2+1),
        a: winnerTeam(src[i])   || {...TBD},
        b: winnerTeam(src[i+1]) || {...TBD},
        date:''
      });
    }
    return out;
  };
  tree.r16 = advance(tree.r32,'r16-');
  tree.qf  = advance(tree.r16,'qf-');
  tree.sf  = advance(tree.qf,'sf-');
  tree.f   = advance(tree.sf,'f-');
  return tree;
}

/* ---------- estado de un partido ---------- */
function statusOf(m){
  const r = results[m.id];
  const ready = !m.a.tbd && !m.b.tbd;
  if(r && r.win) return 'done';
  if(r && (r.sa!=null || r.sb!=null)) return 'live';
  return ready ? 'prog' : 'tbd';
}

/* ============================ RENDER ============================ */
function el(tag, cls, html){const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e;}

function teamRow(m, side){
  const t = m[side];
  const r = results[m.id]||{};
  const won = r.win===side;
  const lost = r.win && r.win!==side;
  const row = el('div','team'+(won?' win':'')+(lost?' lose':''));
  row.innerHTML =
    `<span class="flag">${t.f}</span>`+
    `<span class="name${t.tbd?' tbd':''}">${t.n}</span>`+
    `<span class="score">${ (side==='a'?r.sa:r.sb) ?? '–'}</span>`;
  return row;
}

function matchCard(m, roundLabel){
  const card = el('div','match');
  const st = statusOf(m);
  const pill = st==='done'?'<span class="pill done">Final</span>'
            : st==='live'?'<span class="pill live">En vivo</span>'
            : st==='tbd' ?'<span class="pill prog">Por definir</span>'
            :             '<span class="pill prog">Programado</span>';
  card.appendChild(el('div','topbar',`<span>${roundLabel}${m.date?' · '+m.date:''}</span>${pill}`));
  card.appendChild(teamRow(m,'a'));
  card.appendChild(teamRow(m,'b'));

  if(isAdmin && !m.a.tbd && !m.b.tbd){
    const r = results[m.id]||{};
    const bar = el('div','adminrow');
    bar.innerHTML =
      `<div class="sc"><input type="number" min="0" id="sa-${m.id}" value="${r.sa??''}" placeholder="–"></div>`+
      `<button data-win="a">Gana ${m.a.n}</button>`+
      `<button data-win="b">Gana ${m.b.n}</button>`+
      `<div class="sc"><input type="number" min="0" id="sb-${m.id}" value="${r.sb??''}" placeholder="–"></div>`+
      `<button class="clear" data-clear="1">✕</button>`;
    bar.querySelectorAll('[data-win]').forEach(btn=>btn.onclick=()=>{
      const sa=document.getElementById('sa-'+m.id).value, sb=document.getElementById('sb-'+m.id).value;
      results[m.id]={win:btn.dataset.win, sa:sa===''?null:+sa, sb:sb===''?null:+sb};
      saveResults(); render();
    });
    bar.querySelector('[data-clear]').onclick=()=>{ delete results[m.id]; cascadeClear(m.id); saveResults(); render(); };
    card.appendChild(bar);
  }
  return card;
}

// si se borra un resultado, limpia las rondas siguientes que dependían de él
function cascadeClear(){ /* el árbol se recalcula solo en render(); los hijos quedan TBD y sus resultados viejos se ignoran */ }

function renderRound(rdef){
  const tree = buildTree();
  const list = tree[rdef.key];
  const v = document.getElementById('view');
  v.innerHTML='';
  const head = el('div','round-head',`<h2>${rdef.title}</h2><span class="when">${rdef.when}</span>`);
  v.appendChild(head);
  const wrap = el('div','matches');
  list.forEach(m=>wrap.appendChild(matchCard(m, rdef.label)));
  v.appendChild(wrap);
}

function miniMatch(m){
  const r=results[m.id]||{};
  const node=el('div','mini');
  ['a','b'].forEach(side=>{
    const t=m[side]; const won=r.win===side;
    node.appendChild(el('div','t'+(won?' win':''),
      `<span class="f">${t.f}</span><span class="n${t.tbd?' tbd':''}">${t.n}</span><span class="s">${(side==='a'?r.sa:r.sb)??''}</span>`));
  });
  return node;
}

function renderCuadro(){
  const tree=buildTree();
  const v=document.getElementById('view'); v.innerHTML='';
  v.appendChild(el('p','hint','Desliza para ver todo el cuadro →'));
  const scroll=el('div','cuadro-scroll'); const cuadro=el('div','cuadro');

  const mkCol=(title,arr)=>{const c=el('div','col'); c.appendChild(el('h3',null,title)); arr.forEach(m=>c.appendChild(miniMatch(m))); return c;};

  // mitad izquierda
  cuadro.appendChild(mkCol('16avos', tree.r32.slice(0,8)));
  cuadro.appendChild(mkCol('8vos',   tree.r16.slice(0,4)));
  cuadro.appendChild(mkCol('4tos',   tree.qf.slice(0,2)));
  cuadro.appendChild(mkCol('Semi',   tree.sf.slice(0,1)));

  // centro: final + campeón
  const champTeam = winnerTeam(tree.f[0]);
  const center=el('div','col final-col');
  center.appendChild(el('h3',null,'Final'));
  center.appendChild(miniMatch(tree.f[0]));
  const champ=el('div','champ');
  champ.innerHTML=`<div class="cup">🏆</div><div class="lbl">Campeón</div><div class="who${champTeam?'':' tbd'}">${champTeam?champTeam.f+' '+champTeam.n:'Por definir'}</div>`;
  center.appendChild(champ);
  cuadro.appendChild(center);

  // mitad derecha
  cuadro.appendChild(mkCol('Semi',   tree.sf.slice(1,2)));
  cuadro.appendChild(mkCol('4tos',   tree.qf.slice(2,4)));
  cuadro.appendChild(mkCol('8vos',   tree.r16.slice(4,8)));
  cuadro.appendChild(mkCol('16avos', tree.r32.slice(8,16)));

  scroll.appendChild(cuadro); v.appendChild(scroll);
}

function render(){
  // tabs
  const tabs=document.getElementById('tabs'); tabs.innerHTML='';
  ROUNDS.forEach(r=>{
    const b=el('button','tab',r.label);
    b.setAttribute('role','tab'); b.setAttribute('aria-selected', current===r.key);
    b.onclick=()=>{current=r.key; render();};
    tabs.appendChild(b);
  });
  // view
  if(current==='cuadro') renderCuadro();
  else renderRound(ROUNDS.find(r=>r.key===current));
  // progress
  const decided = R32.filter(m=>results[m.id]&&results[m.id].win).length
                + ['r16','qf','sf','f'].reduce((acc,k)=>acc + buildTree()[k].filter(m=>results[m.id]&&results[m.id].win).length,0);
  document.getElementById('pct').textContent=decided;
  document.getElementById('barfill').style.width=Math.round(decided/15*100)+'%';
  // fase actual
  const tree=buildTree();
  const phase = tree.f[0] && winnerTeam(tree.f[0]) ? 'Campeón 🏆'
    : tree.sf.some(m=>!m.a.tbd) ? 'Semifinales'
    : tree.qf.some(m=>!m.a.tbd) ? 'Cuartos'
    : tree.r16.some(m=>!m.a.tbd) ? 'Octavos' : '16avos';
  document.getElementById('phase').textContent=phase;
}

/* ---------- admin toggle ---------- */
document.getElementById('adminToggle').onclick=function(){
  if(isAdmin){ isAdmin=false; this.classList.remove('on'); this.textContent='🔒 Modo admin'; render(); return; }
  const pin=prompt('PIN de admin para cargar resultados:');
  if(pin===ADMIN_PIN){ isAdmin=true; this.classList.add('on'); this.textContent='🔓 Admin activo'; render(); }
  else if(pin!=null){ alert('PIN incorrecto'); }
};

/* ---------- arranque ---------- */
(async function(){ await loadResults(); render(); })();
</script>
</body>
