<html lang="es">
<head>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>

  h1,h2,h3{margin:0}

  /* HEADER */

  /* PANELS */

  .ph .meta{margin-left:auto;font-size:12px;color:var(--muted);font-weight:600}

  /* TABS */

  nav.tabs button{flex:1;max-width:120px;background:transparent;color:var(--muted);

  /* REVEAL TABLE */

  .chip.c2{color:#7fe0a3;background:rgba(51,183,104,.12);border-color:rgba(51,183,104,.35)}
  .chip.c3{color:#7fd0f5;background:rgba(46,155,230,.12);border-color:rgba(46,155,230,.35)}
  .chip.c5{color:#1a1306;background:linear-gradient(180deg,var(--gold2),var(--gold));border-color:var(--gold)}

  /* RANKING */
  .rk{display:flex;align-items:center;gap:12px;padding:13px 14px;border-bottom:1px solid rgba(255,255,255,.05)}
  .rk:last-child{border-bottom:none}

  .rk.top1 .pos{color:var(--gold2)} .rk.top2 .pos{color:#cfd6e2} .rk.top3 .pos{color:#cd7f43}
  .rk .nm{font-family:'Oswald';font-weight:600;font-size:16px;flex:1;min-width:0;

  .rk .pts{font-family:'Anton';font-size:22px;color:var(--gold2)}
  .rk .pts small{font-family:'Oswald';font-size:11px;color:var(--muted);margin-left:3px;font-weight:600}

  /* RULES */
  .rule{display:flex;gap:12px;padding:13px 14px;border-bottom:1px solid rgba(255,255,255,.05)}
  .rule .badge{width:42px;height:42px;flex:none;border-radius:11px;display:grid;place-items:center;font-size:20px;
    border:1px solid var(--line)}
  .rule .badge.g{background:rgba(51,183,104,.12)} .rule .badge.b{background:rgba(46,155,230,.12)}
  .rule .badge.y{background:rgba(232,181,48,.12)}
  .rule h3{font-family:'Oswald';text-transform:uppercase;letter-spacing:.6px;font-size:14px}
  .rule p{margin:3px 0 0;color:var(--muted);font-size:13px;line-height:1.45}
  .rule .pts{margin-left:auto;font-family:'Anton';font-size:18px;align-self:center}
  .rule .pts.g{color:var(--green)} .rule .pts.b{color:var(--blue)} .rule .pts.y{color:var(--gold2)}
  .combos{width:100%;border-collapse:collapse;margin-top:4px}
  .combos td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px}
  .combos td:last-child{text-align:right;font-family:'Anton';font-size:16px;color:var(--gold2)}

  /* ADMIN */
  .seg{display:flex;gap:6px;margin:0 0 14px;background:#0a1322;border:1px solid var(--line);border-radius:12px;padding:5px}
  .seg button{flex:1;background:transparent;color:var(--muted);font-family:'Oswald';font-weight:600;
    font-size:12px;text-transform:uppercase;letter-spacing:.6px;padding:9px;border-radius:9px}
  .seg button.active{background:rgba(232,181,48,.14);color:var(--gold2)}
  .mini{font-size:12px;color:var(--muted)}
  .divider{height:1px;background:var(--line);margin:14px 0}
  .listrow{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  a.link{color:var(--blue);cursor:pointer;text-decoration:underline}
  .empty{text-align:center;padding:34px 16px;color:var(--muted)}
  .empty .big{font-size:34px;margin-bottom:8px}
  .gtbl{width:100%;border-collapse:collapse;font-size:13px}
  .gtbl th{font-family:'Oswald';font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.5px;color:var(--muted);padding:7px 4px;text-align:center}

  .gtbl td.pos{font-family:'Anton';width:28px;color:var(--muted2)}
  .gtbl td.pos.qual{color:var(--green)} .gtbl td.pos.maybe{color:var(--gold2)}
  .gtbl td.ptscol{font-family:'Anton';color:var(--gold2);width:42px}
  .scroll-x{overflow-x:auto}
  .note{background:rgba(46,155,230,.08);border:1px solid rgba(46,155,230,.25);border-radius:11px;
    padding:10px 12px;font-size:12.5px;color:#bcd6ee;line-height:1.5}
  .code{background:#0a1322;border:1px solid var(--line);border-radius:10px;padding:12px;
    font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#cfe3f7;white-space:pre-wrap;overflow-x:auto;line-height:1.5}
  ol.steps{padding-left:20px;margin:0} ol.steps li{margin:9px 0;line-height:1.5}
  .modal-ov{position:fixed;inset:0;z-index:80;background:rgba(2,5,12,.74);backdrop-filter:blur(4px);
    display:flex;align-items:center;justify-content:center;padding:16px}
  .modal-card{width:100%;max-width:560px;max-height:86vh;display:flex;flex-direction:column;
    background:linear-gradient(180deg,var(--panel),#0b1322);border:1px solid var(--line);
    border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
  .modal-card textarea{flex:1;min-height:300px;background:#0a1322;color:var(--text);border:none;
    border-top:1px solid var(--line);padding:14px;font-family:ui-monospace,Menlo,monospace;font-size:13px;
    line-height:1.5;resize:none;outline:none}
</style>

<body>
<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   POLLA DEL MUNDIAL — Firebase Firestore (sync real entre amigos)
   ============================================================ */

/* ▼▼▼  PEGA AQUÍ LA CONFIG DE TU PROYECTO FIREBASE  ▼▼▼
   (Firebase Console → Configuración del proyecto → Tus apps → Web → firebaseConfig) */
const firebaseConfig = {
  apiKey: "AIzaSyAM35Cw6oUIvgSYE_rO5eDy1AuYhp7NRVU",
  authDomain: "polla-bandita.firebaseapp.com",
  projectId: "polla-bandita",
  storageBucket: "polla-bandita.firebasestorage.app",
  messagingSenderId: "745101038960",
  appId: "1:745101038960:web:b21277c93419516c682bb5"
};
/* ▲▲▲  No toques nada más abajo si no quieres  ▲▲▲ */

let db = null;
function firebaseReady(){ return firebaseConfig.apiKey && firebaseConfig.apiKey.indexOf('PEGA_AQUI')===-1; }

const K = {
  config:'config', standings:'standings', dayIndex:'dayindex',
  day:d=>'day_'+d, pred:(d,p)=>'pred_'+d+'_'+p
};
const LOCK_MS = 5*60*1000; // apuestas cierran 5 min antes del inicio

function refFor(key){
  if(key==='config')   return db.collection('meta').doc('config');
  if(key==='standings')return db.collection('meta').doc('standings');
  if(key==='dayindex') return db.collection('meta').doc('dayindex');
  if(key.indexOf('day_')===0)  return db.collection('days').doc(key.slice(4));
  if(key.indexOf('pred_')===0) return db.collection('preds').doc(key.slice(5));
  return null;
}
async function sget(key){
  try{
    const snap = await refFor(key).get();
    if(!snap.exists) return null;
    const data = snap.data();
    if(key==='dayindex') return data.dates || [];
    return data;
  }catch(e){ console.error('get',key,e); return null; }
}
async function sset(key,val){
  try{
    const payload = (key==='dayindex') ? {dates: val} : val;
    await refFor(key).set(payload);
    return true;
  }catch(e){ console.error('set',key,e); return false; }
}
async function sdel(key){ try{ await refFor(key).delete(); }catch(e){} }

/* ---------- estado en memoria ---------- */
let S = {
  screen:'load',         // load | setup | login | app
  tab:'partidos',        // partidos | ranking | reglas | admin
  config:null,
  me:null,               // {id,name}
  isAdmin:false,
  dayIndex:[],
  selDate:null,
  day:null,              // día seleccionado cargado
  myPred:null,           // mi pronóstico del día seleccionado
  allPreds:null,         // {playerId: pred}  (solo para reveal)
  standings:null,
  adminTab:'fecha',      // fecha | resultados | jugadores | ajustes
  draftMatches:[],       // borrador al crear fecha
};

/* ---------- utilidades ---------- */
const $ = id => document.getElementById(id);
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let toastTimer;
function toast(msg){
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}
function todayStr(){ const d=new Date(); return fmtDateKey(d); }
function fmtDateKey(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function prettyDate(ds){
  const [y,m,d]=ds.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  const dias=['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB'];
  const mes=['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
  return dias[dt.getDay()]+' '+d+' '+mes[m-1];
}
function fmtKO(iso){
  if(!iso) return '';
  const d=new Date(iso);
  return d.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit',hour12:false});
}
function uid(){ return Math.random().toString(36).slice(2,9); }

/* ---------- puntaje (según las reglas de las imágenes) ---------- */
// Acumulativo: +2 tendencia, +1 diferencia, +1 por cada marcador exacto. Máx 5.
function scoreOne(real, pick){
  if(!pick || pick.h==null || pick.a==null) return {p:0,bd:[],noBet:true};
  if(!real || real.h==null || real.a==null) return {p:null,bd:[]};
  let p=0; const bd=[];
  const rs=Math.sign(real.h-real.a), ps=Math.sign(pick.h-pick.a);
  if(rs===ps){ p+=2; bd.push('tendencia'); }
  if((real.h-real.a)===(pick.h-pick.a)){ p+=1; bd.push('diferencia'); }
  if(real.h===pick.h){ p+=1; bd.push('local'); }
  if(real.a===pick.a){ p+=1; bd.push('visita'); }
  return {p:Math.min(p,5),bd,noBet:false};
}
function chipClass(p){
  if(p==null) return 'c0'; if(p>=5) return 'c5'; if(p>=3) return 'c3'; if(p>=2) return 'c2'; if(p>=1) return 'c1'; return 'c0';
}

/* ---------- lock helpers ---------- */
function isLocked(m){ if(!m.kickoff) return false; return Date.now() >= (new Date(m.kickoff).getTime() - LOCK_MS); }
function isStarted(m){ if(!m.kickoff) return false; return Date.now() >= new Date(m.kickoff).getTime(); }
function lockCountdown(m){
  if(!m.kickoff) return '';
  const ms=(new Date(m.kickoff).getTime()-LOCK_MS)-Date.now();
  if(ms<=0) return '';
  const min=Math.floor(ms/60000), h=Math.floor(min/60);
  if(h>=24) return 'Cierra en '+Math.floor(h/24)+'d';
  if(h>0) return 'Cierra en '+h+'h '+(min%60)+'m';
  return 'Cierra en '+min+'m';
}

/* ============================================================
   ARRANQUE
   ============================================================ */
(async function boot(){
  if(!firebaseReady()){ S.screen='needconfig'; render(); return; }
  try{
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    try{ db.settings({ experimentalAutoDetectLongPolling: true }); }catch(e){}
  }catch(e){ console.error(e); S.screen='needconfig'; render(); return; }
  S.config = await sget(K.config);
  if(!S.config){ S.screen='setup'; render(); }
  else { S.screen='login'; render(); }
})();

/* ============================================================
   RENDER PRINCIPAL
   ============================================================ */
function render(){
  const app=$('app');
  if(S.screen==='load'){ app.innerHTML=headerHTML()+'<div class="empty"><div class="big">⚽</div>Cargando…</div>'; return; }
  if(S.screen==='needconfig'){ app.innerHTML=headerHTML()+needConfigHTML(); return; }
  if(S.screen==='setup'){ app.innerHTML=headerHTML()+setupHTML(); bindSetup(); return; }
  if(S.screen==='login'){ app.innerHTML=headerHTML()+loginHTML(); bindLogin(); return; }
  // app
  let body='';
  if(S.tab==='partidos') body=partidosHTML();
  else if(S.tab==='ranking') body=rankingHTML();
  else if(S.tab==='mundial') body=mundialHTML();
  else if(S.tab==='reglas') body=reglasHTML();
  else if(S.tab==='admin') body=adminHTML();
  app.innerHTML = headerHTML(true) + body;
  renderTabs();
  bindByTab();
}

}

async function doLogin(){
  S.config=await sget(K.config); // refresca por si otro cambió algo
  const pid=$('lg_player').value, pin=$('lg_pin').value.trim();
  if(!pid) return toast('Elige tu nombre');

  const pl=S.config.players.find(p=>p.id===pid);

/* ============================================================
   CARGA DE DATOS DE UN DÍA
   ============================================================ */
async function loadDayView(){
  const [dayIndex, standings] = await Promise.all([ sget(K.dayIndex), sget(K.standings) ]);
  S.dayIndex = dayIndex || [];
  S.standings = standings || {perDay:{},totals:{}};
  if(!S.selDate){
    if(S.dayIndex.includes(todayStr())) S.selDate=todayStr();
    else S.selDate=S.dayIndex[S.dayIndex.length-1]||null;
  }
  if(!S.selDate){ S.day=null; S.myPred=null; S.allPreds=null; render(); return; }
  const [day, myPred] = await Promise.all([
    sget(K.day(S.selDate)),
    S.me ? sget(K.pred(S.selDate,S.me.id)) : Promise.resolve(null)
  ]);
  S.day=day; S.myPred=myPred;
  render(); // pinta de inmediato; lo demás carga de fondo
  if(day){
    const ids=S.config.players.map(p=>p.id);
    const preds=await Promise.all(ids.map(id=>sget(K.pred(S.selDate,id))));
    const ap={}; ids.forEach((id,i)=>ap[id]=preds[i]); S.allPreds=ap;
    if(S.screen==='app' && S.tab==='partidos') render();
  } else { S.allPreds=null; }
}
async function loadStandings(){
  S.standings=(await sget(K.standings))||{perDay:{},totals:{}};
  S.config=await sget(K.config)||S.config;
  render();
}

const WC_FEED='https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json';
let wcCache=null, wcFetchedAt=0;
const TEAM_ES={
  "Mexico":"México","South Africa":"Sudáfrica","South Korea":"Corea del Sur","Czech Republic":"Rep. Checa","Czechia":"Chequia",
  "United States":"EE.UU.","USA":"EE.UU.","Canada":"Canadá","Brazil":"Brasil","Spain":"España","Germany":"Alemania","France":"Francia",

  "Japan":"Japón","Australia":"Australia","Saudi Arabia":"Arabia Saudita","Iran":"Irán","Qatar":"Catar","Morocco":"Marruecos",
  "Senegal":"Senegal","Ghana":"Ghana","Nigeria":"Nigeria","Cameroon":"Camerún","Egypt":"Egipto","Algeria":"Argelia","Tunisia":"Túnez",
  "Ivory Coast":"Costa de Marfil","Switzerland":"Suiza","Denmark":"Dinamarca","Sweden":"Suecia","Norway":"Noruega","Poland":"Polonia",
  "Serbia":"Serbia","Austria":"Austria","Turkey":"Turquía","Ukraine":"Ucrania","Scotland":"Escocia","Wales":"Gales","Greece":"Grecia",
  "New Zealand":"Nueva Zelanda","Costa Rica":"Costa Rica","Panama":"Panamá","Honduras":"Honduras","Jamaica":"Jamaica",
  "Cape Verde":"Cabo Verde","Jordan":"Jordania","Uzbekistan":"Uzbekistán","Curacao":"Curazao","Curaçao":"Curazao","Haiti":"Haití",
  "DR Congo":"RD Congo","Mali":"Malí","Burkina Faso":"Burkina Faso","Angola":"Angola","New Caledonia":"Nueva Caledonia",
  "Portugal":"Portugal","Argentina":"Argentina","Uruguay":"Uruguay","Colombia":"Colombia","Ecuador":"Ecuador","Paraguay":"Paraguay","Chile":"Chile"
};
function teamES(t){ return TEAM_ES[t]||t; }
async function loadWorldCup(force){
  if(wcCache && !force && (Date.now()-wcFetchedAt < 5*60*1000)) return wcCache;
  const res=await fetch(WC_FEED,{cache:'no-store'});
  if(!res.ok) throw new Error('http '+res.status);
  const data=await res.json();
  wcCache=data; wcFetchedAt=Date.now();
  return data;
}
function wcRow(t){ return {team:t,pj:0,g:0,e:0,p:0,gf:0,gc:0,pts:0}; }
function computeGroups(data){
  const groups={};
  (data.matches||[]).forEach(m=>{
    if(!m.group||!/^Group/i.test(m.group)) return;
    const g=groups[m.group]=groups[m.group]||{};
    const t1=g[m.team1]=g[m.team1]||wcRow(m.team1);
    const t2=g[m.team2]=g[m.team2]||wcRow(m.team2);
    const ft=m.score&&m.score.ft;
    if(!ft||ft.length<2||ft[0]==null) return;
    const a=ft[0],b=ft[1];
    t1.pj++;t2.pj++;t1.gf+=a;t1.gc+=b;t2.gf+=b;t2.gc+=a;
    if(a>b){t1.g++;t2.p++;t1.pts+=3;} else if(a<b){t2.g++;t1.p++;t2.pts+=3;} else {t1.e++;t2.e++;t1.pts++;t2.pts++;}
  });
  const out={};
  Object.keys(groups).sort().forEach(gn=>{
    out[gn]=Object.values(groups[gn]).map(r=>Object.assign({},r,{dg:r.gf-r.gc}))
      .sort((x,y)=>y.pts-x.pts||y.dg-x.dg||y.gf-x.gf||x.team.localeCompare(y.team));
  });
  return out;
}
async function openMundial(){
  render();
  try{
    const data=await loadWorldCup(S.wcForce); S.wcForce=false;
    S.wcGroups=computeGroups(data); S.wcError=false; S.wcUpdated=wcFetchedAt;
  }catch(e){ if(!S.wcGroups) S.wcError=true; }
  if(S.tab==='mundial') render();
}
function refreshMundial(){ S.wcForce=true; openMundial(); }
function mundialHTML(){
  if(S.wcError && !S.wcGroups){
    return `<div class="panel pad empty"><div class="big">📡</div>No se pudo cargar la tabla del Mundial.<br>
      <span class="mini">Revisa tu conexión e inténtalo de nuevo.</span><br>
      <button class="btn ghost sm" style="margin-top:14px" onclick="refreshMundial()">Reintentar</button></div>`;
  }
  if(!S.wcGroups){
    return `<div class="panel pad empty"><div class="big">🌎</div>Cargando tabla del Mundial…</div>`;
  }
  const upd=S.wcUpdated?new Date(S.wcUpdated).toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'}):'';
  const blocks=Object.keys(S.wcGroups).map(gn=>groupTableHTML(gn,S.wcGroups[gn])).join('');

    <div class="mini center" style="margin:8px 0 0">Datos: openfootball (dominio público). Se actualiza ~1 vez al día${upd?` · visto ${upd}`:''}.</div>`;
}
function groupTableHTML(name, rows){
  const tn=name.replace(/^Group\s*/i,'Grupo ');
  const body=rows.map((r,i)=>{
    const pos=i+1; const cls=pos<=2?'qual':(pos===3?'maybe':'');
    return `<tr>
      <td class="pos ${cls}">${pos}</td>
      <td class="lt">${esc(teamES(r.team))}</td>
      <td>${r.pj}</td>
      <td>${r.dg>0?'+':''}${r.dg}</td>
      <td class="ptscol">${r.pts}</td>
    </tr>`;
  }).join('');
  return `<div class="panel" style="margin-bottom:12px">
    <div class="ph"><span class="dot"></span><h2>${esc(tn)}</h2></div>
    <table class="gtbl">
      <thead><tr><th>#</th><th class="lt">Equipo</th><th>PJ</th><th>DG</th><th>Pts</th></tr></thead>
      <tbody>${body}</tbody>
    </table></div>`;
}

function dateNav(){

  const opts=S.dayIndex.map(d=>`<option value="${d}" ${d===S.selDate?'selected':''}>${prettyDate(d)}</option>`).join('');
  return `<div class="row" style="margin:14px 0 12px">

    <button class="btn ghost sm" onclick="loadDayView()">↻</button>

async function changeDay(d){ S.selDate=d; await loadDayView(); }

function partidosHTML(){
  if(!S.dayIndex.length){
    return `<div class="panel pad empty"><div class="big">📭</div>
      Aún no hay fechas publicadas.<br><span class="mini">El administrador debe publicar los partidos del día.</span></div>`;
  }
  if(!S.day){ return dateNav()+`<div class="panel pad empty">No se pudo cargar la fecha.</div>`; }

  const matches=S.day.matches||[];
  const anyOpen=matches.some(m=>!isLocked(m));
  let cards=matches.map((m,i)=>matchCard(m,i)).join('');
  let saveBar = anyOpen ? `<button class="btn" style="margin-top:14px" onclick="savePicks()">Guardar mis pronósticos</button>
    <div class="mini center" style="margin-top:8px">Solo se guardan los partidos abiertos. Cada uno cierra 5 min antes de empezar.</div>`
    : `<div class="note" style="margin-top:14px">Todos los partidos de esta fecha están cerrados. Ya puedes ver los pronósticos de todos. 👀</div>`;

  return dateNav()+`<div class="panel">
      <div class="ph"><span class="dot"></span><h2>${prettyDate(S.selDate)}</h2>
      <span class="meta">${matches.length} partido${matches.length!==1?'s':''}</span></div>
      ${cards}
    </div>${saveBar}
    <button class="btn ghost" style="margin-top:12px" onclick="shareConsolidado('${S.selDate}')">📲 Compartir apuestas en WhatsApp</button>`;
}

function matchCard(m,i){
  const locked=isLocked(m);
  const real=S.day.results?.[m.id];
  const hasReal=real && real.h!=null;
  const mine=S.myPred?.picks?.[m.id]||{};
  let statusPill;
  if(hasReal) statusPill='<span class="pill lock">Finalizado</span>';
  else if(isStarted(m)) statusPill='<span class="pill live">● En juego</span>';
  else if(locked) statusPill='<span class="pill lock">Cerrado</span>';
  else statusPill=`<span class="pill open">${lockCountdown(m)||'Abierto'}</span>`;

  const disabled=locked?'disabled':'';
  const hv=mine.h!=null?mine.h:'';
  const av=mine.a!=null?mine.a:'';

  let realRow = hasReal ? `<div class="center" style="margin-top:6px">
      <span class="real-badge">Resultado real &nbsp;${real.h} - ${real.a}</span></div>` : '';

  let reveal='';
  if(locked){
    reveal=`<div class="reveal" id="rev_${m.id}">${revealRows(m,real,hasReal)}</div>`;
  }

  return `<div class="match">
    <div class="mtop"><span class="ko">${fmtKO(m.kickoff)||'Hora por confirmar'}</span>${statusPill}</div>
    <div class="teams">
      <div class="team h">${esc(m.home)}</div>
      <div class="score-in">
        <input class="sin" data-mid="${m.id}" data-side="h" inputmode="numeric" maxlength="2" value="${hv}" ${disabled}>
        <span class="vs">vs</span>
        <input class="sin" data-mid="${m.id}" data-side="a" inputmode="numeric" maxlength="2" value="${av}" ${disabled}>
      </div>
      <div class="team a">${esc(m.away)}</div>
    </div>
    ${realRow}
    ${reveal}
  </div>`;
}

function revealRows(m,real,hasReal){
  const rows=S.config.players.map(pl=>{
    const pred=S.allPreds?.[pl.id];
    const pick=pred?.picks?.[m.id];
    const isMe=S.me&&pl.id===S.me.id;
    let pickStr = (pick&&pick.h!=null)?`${pick.h}-${pick.a}`:'—';
    let chip='';
    if(hasReal){
      const sc=scoreOne(real,pick);
      chip=`<span class="chip ${chipClass(sc.p)}">${sc.noBet?'0':sc.p}</span>`;
    } else {
      chip=`<span class="chip c0">·</span>`;
    }
    return `<div class="rline">
      <div class="nm">${isMe?'<b style="color:var(--gold2)">Tú</b>':esc(pl.name)}</div>
      <span class="rpick">${pickStr}</span>${chip}
    </div>`;
  }).join('');
  return `<div class="mini" style="margin:2px 0 4px;text-transform:uppercase;letter-spacing:1px;color:var(--muted2)">Pronósticos${hasReal?' · puntos':''}</div>`+rows;
}

async function savePicks(){
  if(!S.me) return;
  const inputs=document.querySelectorAll('.sin[data-mid]');
  const picks=Object.assign({},S.myPred?.picks||{});
  let saved=0, partial=0;
  // agrupar por match
  const byMatch={};
  inputs.forEach(inp=>{
    const mid=inp.dataset.mid, side=inp.dataset.side;
    if(inp.disabled) return; // cerrado: no tocar
    byMatch[mid]=byMatch[mid]||{};
    const v=inp.value.trim();
    byMatch[mid][side]=v===''?null:Math.max(0,Math.min(30,parseInt(v,10)||0));
  });
  for(const mid in byMatch){
    const h=byMatch[mid].h, a=byMatch[mid].a;
    if(h!=null && a!=null){ picks[mid]={h,a}; saved++; }
    else if(h!=null || a!=null){ partial++; delete picks[mid]; }
    else { delete picks[mid]; }
  }
  const rec={picks,updatedAt:Date.now()};
  const ok=await sset(K.pred(S.selDate,S.me.id),rec);
  if(!ok) return toast('No se pudo guardar, reintenta');
  S.myPred=rec; S.allPreds[S.me.id]=rec;
  toast(partial? `Guardado (${saved}). ${partial} quedó incompleto = Sin Apuesta` : `Guardado ✓ (${saved} partido${saved!==1?'s':''})`);
}

function rankingHTML(){
  const st=S.standings||{totals:{},perDay:{}};
  const players=S.config.players.map(p=>({...p,pts:st.totals[p.id]||0}));
  players.sort((a,b)=>b.pts-a.pts || a.name.localeCompare(b.name));
  const playedDays=Object.keys(st.perDay||{}).length;
  if(playedDays===0 && players.every(p=>p.pts===0)){
    var note=`<div class="empty"><div class="big">🏁</div>El ranking aparece cuando se ingresen resultados.</div>`;
  }
  let rows=players.map((p,i)=>{

function parseCalendar(raw){
  const byDate={}; let count=0, skipped=0;
  (raw||'').split('\n').forEach(line=>{
    line=line.trim();
    if(!line || line[0]==='#') return;
    let date=null,time='',home=null,away=null;
    const parts=line.split('|').map(s=>s.trim());
    if(parts.length>=4){ date=parts[0]; time=parts[1]; home=parts[2]; away=parts[3]; }
    else if(parts.length===3){ const dt=parts[0].split(/\s+/); date=dt[0]; time=dt[1]||''; home=parts[1]; away=parts[2]; }
    else {
      const m=line.match(/^(\d{4}-\d{2}-\d{2})\s+(\d{1,2}:\d{2})\s+(.+?)\s+(?:vs|v|x|-)\s+(.+)$/i);
      if(m){ date=m[1]; time=m[2]; home=m[3].trim(); away=m[4].trim(); }
    }
    if(!date||!/^\d{4}-\d{2}-\d{2}$/.test(date)||!home||!away){ skipped++; return; }
    let kickoff=null;
    if(time && /^\d{1,2}:\d{2}$/.test(time)){
      const [y,mo,d]=date.split('-').map(Number); const [hh,mm]=time.split(':').map(Number);
      kickoff=new Date(y,mo-1,d,hh,mm).toISOString();
    }
    (byDate[date]=byDate[date]||[]).push({id:uid(),home,away,kickoff});
    count++;
  });
  return {byDate,count,skipped};
}
function previewImport(){
  S.importDraft=$('imp_text').value;

async function commitImport(){
  const res=S.importPreview; if(!res||!res.count) return;
  let idx=(await sget(K.dayIndex))||[]; let added=0;
  for(const date of Object.keys(res.byDate)){
    const existing=await sget(K.day(date));
    const matches=existing?existing.matches.slice():[];
    for(const m of res.byDate[date]){
      const dup=matches.some(x=>x.home===m.home&&x.away===m.away&&x.kickoff===m.kickoff);
      if(!dup){ matches.push(m); added++; }
    }
    await sset(K.day(date),{date,matches,results:existing?.results||{}});
    if(!idx.includes(date)) idx.push(date);
  }
  idx.sort(); await sset(K.dayIndex,idx); S.dayIndex=idx;
  S.importPreview=null; S.importDraft='';
  toast(`Importados ${added} partido(s) ✓`);
  S.adminTab='resultados'; S.selDate=Object.keys(res.byDate).sort()[0]; S.day=await sget(K.day(S.selDate)); render();
}

  const ms=S.draftMatches.filter(m=>m.home.trim()&&m.away.trim());

  const normalized=ms.map(m=>({id:m.id||uid(),home:m.home.trim(),away:m.away.trim(),
    kickoff:m.kickoff?new Date(m.kickoff).toISOString():null}));
  const existing=await sget(K.day(date));

  if(existing&&existing.results){ for(const id in existing.results){ if(keep.has(id)) results[id]=existing.results[id]; } }
  const ok=await sset(K.day(date),{date,matches:normalized,results});
  if(!ok) return toast('No se pudo guardar');
  let idx=(await sget(K.dayIndex))||[];
  if(!idx.includes(date)){ idx.push(date); idx.sort(); await sset(K.dayIndex,idx); }

  await rescoreDay(date);
  toast('Fecha guardada ✓');
  S.adminTab='resultados'; S.selDate=date; S.day=await sget(K.day(date)); render();
}

async function saveResults(date){
  const day=await sget(K.day(date)); if(!day) return toast('Fecha no encontrada');
  const inputs=document.querySelectorAll('.sin[data-rid]');
  const byMatch={};
  inputs.forEach(inp=>{
    const mid=inp.dataset.rid,side=inp.dataset.side,v=inp.value.trim();
    byMatch[mid]=byMatch[mid]||{};
    byMatch[mid][side]=v===''?null:Math.max(0,Math.min(30,parseInt(v,10)||0));
  });
  const results={};
  for(const mid in byMatch){
    const h=byMatch[mid].h,a=byMatch[mid].a;
    if(h!=null&&a!=null) results[mid]={h,a};
  }
  day.results=results;
  const ok=await sset(K.day(date),day);
  if(!ok) return toast('No se pudo guardar');
  await rescoreDay(date);
  S.day=day; toast('Resultados guardados y ranking actualizado ✓');
  render();
}
async function rescoreDay(date){
  const [day, cfg] = await Promise.all([ sget(K.day(date)), sget(K.config) ]);
  if(!day || !cfg) return;
  const preds = await Promise.all(cfg.players.map(pl=>sget(K.pred(date,pl.id))));
  const perDay={};
  cfg.players.forEach((pl,i)=>{
    const pred=preds[i]; let total=0;
    for(const m of day.matches){
      const real=day.results?.[m.id];
      if(real&&real.h!=null){ const sc=scoreOne(real,pred?.picks?.[m.id]); total+=(sc.p||0); }
    }
    perDay[pl.id]=total;
  });
  const st=(await sget(K.standings))||{perDay:{},totals:{}};
  st.perDay[date]=perDay;
  recomputeTotals(st);
  await sset(K.standings,st);
  S.standings=st;
}
function recomputeTotals(st){
  const totals={}; const base=st.base||{};
  for(const pid in base) totals[pid]=(totals[pid]||0)+(base[pid]||0);
  for(const d in (st.perDay||{})) for(const pid in st.perDay[d]) totals[pid]=(totals[pid]||0)+(st.perDay[d][pid]||0);
  st.totals=totals;
}
async function saveBasePoints(){
  const st=(await sget(K.standings))||{perDay:{},totals:{}};
  st.base=st.base||{};
  document.querySelectorAll('.bp[data-pid]').forEach(inp=>{
    st.base[inp.dataset.pid]=Math.max(0,parseInt(inp.value,10)||0);
  });
  recomputeTotals(st);
  await sset(K.standings,st); S.standings=st;
  toast('Puntos acumulados guardados ✓');
}

async function buildConsolidado(date){
  const day = await sget(K.day(date));
  if(!day || !day.matches || !day.matches.length) return null;
  const ids = S.config.players.map(p=>p.id);
  const preds = await Promise.all(ids.map(id=>sget(K.pred(date,id))));
  const predBy={}; ids.forEach((id,i)=>predBy[id]=preds[i]);

  let out = `🏆 *POLLA MUNDIAL · LA BANDITA DE MACUL*\n📅 ${prettyDate(date)}\n`;

  day.matches.forEach(m=>{
    const real=day.results?.[m.id];
    const hasReal=real&&real.h!=null;
    const locked=isLocked(m);
    if(!hasReal && !locked){
      out += `\n⚽ *${m.home} vs ${m.away}* · 🔓 abierta (cierra ${fmtKO(m.kickoff)||'s/h'}) — apuestas ocultas\n`;
      return;
    }
    out += `\n⚽ *${m.home} ${hasReal?`${real.h}-${real.a}`:'vs'} ${m.away}*${hasReal?' ✔️':' 🔒'}\n`;
    S.config.players.forEach(p=>{
      const pk=predBy[p.id]?.picks?.[m.id];
      const pickStr=(pk&&pk.h!=null)?`${pk.h}-${pk.a}`:'—';
      let pts='';
      if(hasReal){ const sc=scoreOne(real,pk); pts=` ➜ ${sc.noBet?0:sc.p} pts`; }
      out += `• ${p.name}: ${pickStr}${pts}\n`;
    });
  });

  const st=(await sget(K.standings))||{totals:{}};
  const rank=S.config.players.map(p=>({name:p.name,pts:(st.totals[p.id]||0)}))
    .sort((a,b)=>b.pts-a.pts || a.name.localeCompare(b.name));
  out += `\n🏅 *Ranking general:*\n`;
  out += rank.map((x,i)=>{ const med=i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`; return `${med} ${x.name}: ${x.pts} pts`; }).join('\n');
  out += `\n\n_Generado por la app · Que gane el mejor 💪_`;
  return out.trim();
}
async function shareConsolidado(date){
  toast('Generando…');
  const text=await buildConsolidado(date);
  if(!text){ toast('No hay partidos para compartir'); return; }
  if(navigator.share){
    try{ await navigator.share({text}); return; }
    catch(e){ if(e && e.name==='AbortError') return; }
  }
  openShareModal(text);
}
function openShareModal(text){

  const ov=document.createElement('div'); ov.className='modal-ov'; ov.id='shareModal';

}

async function copyShare(){

/* --- Admin: jugadores --- */
function adminJugadores(){
  const rows=S.config.players.map((p,i)=>`
    <div class="listrow">
      <input class="input" style="flex:1" value="${esc(p.name)}" onchange="renamePlayer('${p.id}',this.value)">
      <span class="pill ${p.pin?'lock':'open'}">${p.pin?'PIN ✓':'sin PIN'}</span>
      ${p.pin?`<button class="btn ghost sm" onclick="resetPin('${p.id}')">Reset PIN</button>`:''}
    </div>`).join('');
  return `<div class="panel pad">
    <div class="mini" style="margin-bottom:8px">Jugadores: <b style="color:var(--text)">${S.config.players.length}</b> / 14</div>
    ${rows}
    ${S.config.players.length<14?`<button class="btn ghost" style="margin-top:12px" onclick="addPlayer()">+ Agregar jugador</button>`:''}
  </div>
  <div class="note" style="margin-top:12px">“Reset PIN” permite que un jugador vuelva a fijar su PIN (si lo olvidó). Tú no ves los PIN ni los pronósticos de los demás desde aquí.</div>`;
}
async function renamePlayer(id,name){
  S.config=await sget(K.config);
  const p=S.config.players.find(x=>x.id===id); if(!p) return;
  p.name=name.trim()||p.name; await sset(K.config,S.config); toast('Nombre actualizado');
}
async function resetPin(id){
  if(!confirm('¿Borrar el PIN de este jugador para que lo fije de nuevo?')) return;
  S.config=await sget(K.config);
  const p=S.config.players.find(x=>x.id===id); if(!p) return;
  p.pin=null; await sset(K.config,S.config); toast('PIN reseteado'); render();
}
async function addPlayer(){
  const name=prompt('Nombre del jugador:'); if(!name||!name.trim()) return;
  S.config=await sget(K.config);
  if(S.config.players.length>=14) return toast('Ya hay 14 jugadores');
  S.config.players.push({id:uid(),name:name.trim(),pin:null});
  await sset(K.config,S.config); toast('Jugador agregado'); render();
}

/* --- Admin: ajustes --- */
function adminAjustes(){
  const base=(S.standings&&S.standings.base)||{};
  const bprows=S.config.players.map(p=>`
    <div class="listrow">
      <span class="osw" style="flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.name)}</span>
      <input class="sin bp" data-pid="${p.id}" style="width:64px;height:42px;font-size:18px" inputmode="numeric" maxlength="4" value="${base[p.id]!=null?base[p.id]:0}">
    </div>`).join('');
  return `<div class="panel pad">
    <div class="row" style="justify-content:space-between"><b class="osw">📥 Cargar puntos acumulados</b><span class="pill open">inicial</span></div>
    <p class="mini" style="margin:8px 0">Si ya venían jugando, ingresa el puntaje actual de cada uno. La app seguirá sumando sobre estos en cada fecha nueva.</p>
    ${bprows}
    <button class="btn" style="margin-top:12px" onclick="saveBasePoints()">Guardar puntos acumulados</button>
    <div class="mini" style="margin-top:8px">Importante: estos son los puntos de los días <b>ya jugados</b>. No vuelvas a ingresar resultados de esos días en la app, o se sumarían dos veces.</div>
  </div>
  <div class="divider"></div>
  <div class="panel pad">
    <div class="field" style="margin-top:0">
      <label>Cambiar PIN de administrador</label>
      <input class="input" id="aj_pin" inputmode="numeric" maxlength="6" placeholder="Nuevo PIN (4-6 dígitos)">
    </div>
    <button class="btn blue" onclick="changeAdminPin()">Guardar nuevo PIN</button>
    <div class="divider"></div>
    <div class="mini">Enlace de la app: compártelo con los 14 amigos. Cada uno entra con su nombre y fija su PIN la primera vez.</div>
    <div class="divider"></div>
    <button class="btn danger" onclick="wipeAll()">Reiniciar TODO (borrar polla)</button>
    <div class="mini" style="margin-top:6px">Borra jugadores, fechas, pronósticos y ranking. No se puede deshacer.</div>
  </div>`;
}
async function changeAdminPin(){
  const pin=$('aj_pin').value.trim();
  if(!/^\d{4,6}$/.test(pin)) return toast('PIN inválido (4-6 dígitos)');
  S.config=await sget(K.config); S.config.adminPin=pin; await sset(K.config,S.config);
  toast('PIN de admin actualizado');
}
async function wipeAll(){
  if(!confirm('Esto borra TODA la polla. ¿Seguro?')) return;
  if(!confirm('Última confirmación: se perderán jugadores, fechas y ranking.')) return;
  const idx=(await sget(K.dayIndex))||[];
  for(const d of idx){
    await sdel(K.day(d));
    for(const pl of (S.config.players||[])){ await sdel(K.pred(d,pl.id)); }
  }
  await sdel(K.config);
  await sdel(K.dayIndex);
  await sdel(K.standings);
  S=Object.assign(S,{config:null,me:null,isAdmin:false,dayIndex:[],selDate:null,day:null,screen:'setup'});
  const n=document.querySelector('nav.tabs'); if(n) n.remove();
  toast('Polla reiniciada'); render();
}

function bindByTab(){ /* listeners ya van inline */ }

// actualiza textos de "Cierra en…" sin re-renderizar (no pisa lo que escribes)
setInterval(()=>{
  if(S.screen!=='app'||S.tab!=='partidos'||!S.day) return;
  document.querySelectorAll('.pill.open').forEach(()=>{});
  // refresco ligero: solo si hay countdowns visibles, re-render cada 30s
},1000);
let lastSoftRefresh=Date.now();
setInterval(async ()=>{
  if(S.screen!=='app') return;
  // refresco suave del ranking
  if(S.tab==='ranking'){ await loadStandings(); }
  // en partidos: re-render solo si cambió el estado de lock de algún partido (para revelar)
  if(S.tab==='partidos' && S.day){
    const editingFocus=document.activeElement && document.activeElement.classList.contains('sin');
    if(!editingFocus && Date.now()-lastSoftRefresh>20000){
      lastSoftRefresh=Date.now(); await loadDayView();
    }
  }
},8000);
</script>
